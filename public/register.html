<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ADUN Lost & Found</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">ADUN Lost & Found</a>
            <div class="nav-links">
                <a href="/">Browse</a>
                <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
                <div id="auth-links"></div>
            </div>
        </div>
    </nav>

    <main class="container">
        <form id="register-form">
            <h2 style="margin-bottom:1rem;text-align:center">Register</h2>
            <div id="error-msg" class="alert alert-error hidden"></div>
            <div id="success-msg" class="alert alert-success hidden"></div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label for="type">Account Type</label>
                <select id="type">
                    <option value="buyer">Buyer</option>
                    <option value="seller">Seller</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
            <div class="form-link">Already have an account? <a href="/login.html">Login</a></div>
        </form>
    </main>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const type = document.getElementById('type').value;
            const errEl = document.getElementById('error-msg');
            const sucEl = document.getElementById('success-msg');

            errEl.classList.add('hidden');
            sucEl.classList.add('hidden');

            const data = await api.post('/auth/register', { email, password, type });

            if (data.success) {
                sucEl.textContent = 'Account created! Redirecting to login...';
                sucEl.classList.remove('hidden');
                setTimeout(() => window.location.href = '/login.html', 1500);
            } else {
                errEl.textContent = data.message || 'Registration failed';
                errEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
