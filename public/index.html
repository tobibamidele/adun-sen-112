<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADUN Lost & Found</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">ADUN Lost & Found</a>
            <div class="nav-links">
                <a href="/">Browse</a>
                <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
                <div id="auth-links"></div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1 class="page-title">Browse Items</h1>
        <div class="product-grid" id="product-list"></div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        async function loadProducts() {
            const data = await api.get('/api/products');
            const list = document.getElementById('product-list');

            if (!data.success || !data.products.length) {
                list.innerHTML = '<div class="empty-state"><p>No items listed yet.</p></div>';
                return;
            }

            list.innerHTML = data.products.map(p => `
                <div class="card">
                    <img class="card-img" src="${p.image_storage_path || ''}" alt="${p.name}" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
                    <div class="card-body">
                        <div class="card-title">${p.name}</div>
                        <div class="card-price">$${parseFloat(p.price).toFixed(2)}</div>
                        <div class="card-stock">${p.stock > 0 ? p.stock + ' in stock' : 'Out of stock'}</div>
                        <div style="display:flex;gap:0.5rem">
                            <a href="/product.html?id=${p.id}" class="btn btn-outline btn-sm">View</a>
                            <button class="btn btn-primary btn-sm" onclick="addToCart('${p.id}')">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function addToCart(productId) {
            const data = await api.get('/api/products/' + productId);
            if (data.success) {
                cart.addItem(data.product);
            }
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
