<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - ADUN Lost & Found</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">ADUN Lost & Found</a>
            <div class="nav-links">
                <a href="/">Browse</a>
                <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
                <div id="auth-links"></div>
            </div>
        </div>
    </nav>

    <main class="container" id="product-detail"></main>

    <script src="/js/app.js"></script>
    <script>
        async function loadProduct() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('product-detail').innerHTML = '<p>No product specified.</p>';
                return;
            }

            const data = await api.get('/api/products/' + id);
            if (!data.success) {
                document.getElementById('product-detail').innerHTML = '<p>Product not found.</p>';
                return;
            }

            const p = data.product;
            document.getElementById('product-detail').innerHTML = `
                <div class="product-detail">
                    <img src="${p.image_storage_path || ''}" alt="${p.name}" onerror="this.src='https://placehold.co/600x400?text=No+Image'">
                    <div class="product-info">
                        <h1>${p.name}</h1>
                        <div class="price">$${parseFloat(p.price).toFixed(2)}</div>
                        <div class="stock">${p.stock > 0 ? p.stock + ' in stock' : 'Out of stock'}</div>
                        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
                        <br><br>
                        <a href="/" class="btn btn-outline">&larr; Back to Browse</a>
                    </div>
                </div>
            `;
            window._product = p;
        }

        function addToCart() {
            if (window._product) {
                cart.addItem(window._product);
            }
        }

        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
</body>
</html>
