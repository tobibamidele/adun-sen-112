<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - ADUN Lost & Found</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">ADUN Lost & Found</a>
            <div class="nav-links">
                <a href="/">Browse</a>
                <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
                <div id="auth-links"></div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1 class="page-title">Order History</h1>
        <div id="orders-list"></div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        async function loadOrders() {
            const user = await initAuth();
            const el = document.getElementById('orders-list');

            if (!user) {
                el.innerHTML = `
                    <div class="empty-state">
                        <p>Please log in to view your orders.</p>
                        <a href="/login.html" class="btn btn-primary">Login</a>
                    </div>
                `;
                return;
            }

            const data = await api.get('/api/orders');

            if (!data.success) {
                el.innerHTML = `<div class="alert alert-error">${data.message}</div>`;
                return;
            }

            if (!data.orders.length) {
                el.innerHTML = '<div class="empty-state"><p>No orders yet.</p><a href="/" class="btn btn-primary">Browse Items</a></div>';
                return;
            }

            el.innerHTML = data.orders.map(order => `
                <div style="background:white;border-radius:8px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.08)">
                    <div style="display:flex;justify-content:space-between;margin-bottom:1rem">
                        <div>
                            <strong>Order #${order.id}</strong>
                            <span style="color:#666;margin-left:1rem;font-size:0.9rem">${new Date(order.created_at).toLocaleDateString()}</span>
                        </div>
                        <div>
                            <span style="font-weight:700">$${parseFloat(order.total).toFixed(2)}</span>
                            <span class="badge" style="background:#d4edda;color:#155724;padding:0.2rem 0.5rem;border-radius:4px;margin-left:0.5rem;font-size:0.85rem">${order.status}</span>
                        </div>
                    </div>
                    ${order.items ? `
                        <table class="table">
                            <thead>
                                <tr><th>Product</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr>
                            </thead>
                            <tbody>
                                ${order.items.map(item => `
                                    <tr>
                                        <td>${item.product_id}</td>
                                        <td>${item.quantity}</td>
                                        <td>$${parseFloat(item.price).toFixed(2)}</td>
                                        <td>$${(item.quantity * item.price).toFixed(2)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    ` : ''}
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>
</html>
