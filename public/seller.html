<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - ADUN Lost & Found</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">ADUN Lost & Found</a>
            <div class="nav-links">
                <a href="/">Browse</a>
                <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
                <div id="auth-links"></div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1 class="page-title">Seller Dashboard</h1>

        <h2 style="margin-bottom:1rem">Add Product</h2>
        <form id="product-form" style="max-width:100%;margin:0 0 2rem 0">
            <div id="form-msg" class="alert hidden"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" step="0.01" id="price" required>
                </div>
                <div class="form-group">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock" required>
                </div>
                <div class="form-group">
                    <label for="image">Image</label>
                    <input type="file" id="image" accept="image/*" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="form-submit">Add Product</button>
            <button type="button" class="btn btn-outline hidden" id="form-cancel" onclick="resetForm()">Cancel</button>
        </form>

        <h2 style="margin-bottom:1rem">My Products</h2>
        <div id="product-list"></div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        let editingId = null;

        async function loadProducts() {
            const data = await api.get('/api/seller/products');
            const el = document.getElementById('product-list');

            if (!data.success) {
                el.innerHTML = `<div class="alert alert-error">${data.message}</div>`;
                return;
            }

            if (!data.products.length) {
                el.innerHTML = '<div class="empty-state"><p>No products yet. Add one above!</p></div>';
                return;
            }

            el.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.products.map(p => `
                            <tr>
                                <td><img src="${p.image_storage_path || ''}" onerror="this.src='https://placehold.co/50'"></td>
                                <td>${p.name}</td>
                                <td>$${parseFloat(p.price).toFixed(2)}</td>
                                <td>${p.stock}</td>
                                <td class="actions">
                                    <button class="btn btn-outline btn-sm" onclick="editProduct('${p.id}')">Edit</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function editProduct(id) {
            const data = await api.get('/api/seller/products');
            const product = data.products.find(p => p.id === id);
            if (!product) return;

            editingId = id;
            document.getElementById('name').value = product.name;
            document.getElementById('price').value = product.price;
            document.getElementById('stock').value = product.stock;
            document.getElementById('image').required = false;
            document.getElementById('form-submit').textContent = 'Update Product';
            document.getElementById('form-cancel').classList.remove('hidden');
            document.getElementById('form-msg').classList.add('hidden');
        }

        function resetForm() {
            editingId = null;
            document.getElementById('product-form').reset();
            document.getElementById('image').required = true;
            document.getElementById('form-submit').textContent = 'Add Product';
            document.getElementById('form-cancel').classList.add('hidden');
            document.getElementById('form-msg').classList.add('hidden');
        }

        async function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            const data = await api.del('/api/seller/products/' + id);
            if (data.success) {
                loadProducts();
            } else {
                alert(data.message);
            }
        }

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgEl = document.getElementById('form-msg');
            msgEl.classList.add('hidden');

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('stock', document.getElementById('stock').value);
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) formData.append('image', imageFile);

            let data;
            if (editingId) {
                data = await api.putForm('/api/seller/products/' + editingId, formData);
            } else {
                if (!imageFile) {
                    msgEl.textContent = 'Image is required';
                    msgEl.className = 'alert alert-error';
                    msgEl.classList.remove('hidden');
                    return;
                }
                data = await api.postForm('/api/seller/products', formData);
            }

            if (data.success) {
                resetForm();
                loadProducts();
                msgEl.textContent = data.message;
                msgEl.className = 'alert alert-success';
                msgEl.classList.remove('hidden');
            } else {
                msgEl.textContent = data.message;
                msgEl.className = 'alert alert-error';
                msgEl.classList.remove('hidden');
            }
        });

        initAuth().then(user => {
            if (!user || user.type !== 'seller') {
                window.location.href = '/';
            } else {
                loadProducts();
            }
        });
    </script>
</body>
</html>
